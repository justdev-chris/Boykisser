<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boykisser</title>
    <link rel="icon" href="assets/cat/default.png" type="image/png">
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 16px;
            touch-action: manipulation;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .kiss-counter {
            font-size: clamp(28px, 8vw, 48px);
            font-weight: 700;
            color: #000000;
            margin-bottom: 12px;
            pointer-events: none;
        }

        .cat-container {
            cursor: pointer;
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            touch-action: manipulation;
        }

        .cat-image {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
            position: relative;
            z-index: 1;
        }

        .clip-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            display: none;
            border-radius: 12px;
            z-index: 2;
            background: transparent;
        }

        audio {
            display: none;
        }

        .upgrade-btn {
            margin-top: 12px;
            background: #e0e0e0;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: #222;
            cursor: pointer;
            transition: 0.15s;
            touch-action: manipulation;
        }

        .upgrade-btn:hover {
            background: #d0d0d0;
        }

        .upgrade-list {
            margin-top: 12px;
            background: #f5f5f5;
            border-radius: 16px;
            padding: 12px 16px;
            border: 1px solid #ddd;
            display: none;
            text-align: left;
        }

        .upgrade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #eee;
        }

        .upgrade-item:last-child {
            border-bottom: none;
        }

        .upgrade-name {
            color: #222;
            font-weight: 500;
        }
        .upgrade-cost {
            color: #666;
            font-size: 13px;
        }
        .upgrade-btn-small {
            background: #e0e0e0;
            border: none;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .upgrade-btn-small:hover {
            background: #d0d0d0;
        }
        .reset-btn {
            background: transparent;
            border: none;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
            touch-action: manipulation;
        }
        .reset-btn:hover {
            color: #222;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="kiss-counter" id="kissCount">0</div>

        <div class="cat-container" id="clickArea">
            <img id="catImage" src="assets/cat/default.png" alt="Boykisser" class="cat-image">
        </div>

        <button class="upgrade-btn" id="upgradesToggle">⬆ Upgrades</button>

        <div class="upgrade-list" id="upgradeList">
            <div class="upgrade-item">
                <span class="upgrade-name">Kisses per second</span>
                <span class="upgrade-cost" id="kpsDisplay">0</span>
                <button class="upgrade-btn-small" id="upgradeKps">+1</button>
            </div>
            <div class="upgrade-item">
                <span class="upgrade-name">Multiplier</span>
                <span class="upgrade-cost" id="multiDisplay">1x</span>
                <button class="upgrade-btn-small" id="upgradeMulti">+0.5x</button>
            </div>
            <div class="upgrade-item">
                <span class="upgrade-name">Blush power</span>
                <span class="upgrade-cost" id="blushDisplay">0</span>
                <button class="upgrade-btn-small" id="upgradeBlush">+1</button>
            </div>
            <button class="reset-btn" id="resetBtn">↺ reset</button>
        </div>
    </div>

    <script>
        // ─── DEBUG ──────────────────────────────────────────────────
        if (new URLSearchParams(window.location.search).has('debug')) {
            new VConsole();
        }

        // ─── STATE ──────────────────────────────────────────────────
        let state = {
            kisses: 0,
            kps: 0,
            multi: 1,
            blush: 0,
            kissCost: 20,
            multiCost: 30,
            blushCost: 50
        };

        // ─── MEDIA POOLS ──────────────────────────────────────────
        const clips = [
            'assets/clips/kiss1.mp4',
            'assets/clips/kiss2.mp4',
            'assets/clips/kiss3.mp4',
            'assets/clips/kiss4.mp4',
            'assets/clips/kiss5.mp4'
        ];
        const meows = [
            'assets/sounds/meow1.mp3',
            'assets/sounds/meow2.mp3'
        ];

        // Audio pool
        const meowPool = Array.from({ length: 5 }, () => new Audio());
        let meowIndex = 0;

        function playMeow() {
            const el = meowPool[meowIndex % meowPool.length];
            const src = meows[Math.floor(Math.random() * meows.length)];
            el.src = src;
            el.currentTime = 0;
            el.play().catch(() => {});
            meowIndex++;
        }

        // Video pool (UNMUTED)
        const clipPool = Array.from({ length: 5 }, () => {
            const video = document.createElement('video');
            video.playsInline = true;
            video.preload = 'auto';
            video.className = 'clip-overlay';
            return video;
        });
        let clipIndex = 0;

        const catContainer = document.getElementById('clickArea');
        clipPool.forEach(v => catContainer.appendChild(v));

        function playClip() {
            const el = clipPool[clipIndex % clipPool.length];
            el.pause();
            el.currentTime = 0;
            const src = clips[Math.floor(Math.random() * clips.length)];
            el.src = src;
            el.style.display = 'block';
            el.play().catch(() => {});
            
            const hide = () => {
                el.style.display = 'none';
                el.pause();
            };
            el.onended = hide;
            clearTimeout(el._hideTimer);
            el._hideTimer = setTimeout(hide, 2000);
            clipIndex++;
        }

        // ─── DOM REFS ──────────────────────────────────────────────
        const kissCount = document.getElementById('kissCount');
        const catImage = document.getElementById('catImage');
        const clickArea = document.getElementById('clickArea');

        const kpsDisplay = document.getElementById('kpsDisplay');
        const multiDisplay = document.getElementById('multiDisplay');
        const blushDisplay = document.getElementById('blushDisplay');
        const upgradeKps = document.getElementById('upgradeKps');
        const upgradeMulti = document.getElementById('upgradeMulti');
        const upgradeBlush = document.getElementById('upgradeBlush');
        const resetBtn = document.getElementById('resetBtn');
        const upgradesToggle = document.getElementById('upgradesToggle');
        const upgradeList = document.getElementById('upgradeList');

        let lastSave = Date.now();

        // ─── UPDATE UI ──────────────────────────────────────────────
        function updateUI() {
            kissCount.textContent = Math.floor(state.kisses).toLocaleString();
            kpsDisplay.textContent = state.kps;
            multiDisplay.textContent = state.multi.toFixed(1) + 'x';
            blushDisplay.textContent = state.blush;
            upgradeKps.textContent = `+1 (${Math.floor(state.kissCost)})`;
            upgradeMulti.textContent = `+0.5x (${Math.floor(state.multiCost)})`;
            upgradeBlush.textContent = `+1 (${Math.floor(state.blushCost)})`;

            if (Date.now() - lastSave > 5000) {
                localStorage.setItem('boykisser_save', JSON.stringify(state));
                lastSave = Date.now();
            }
        }

        function loadSave() {
            const raw = localStorage.getItem('boykisser_save');
            if (raw) {
                try {
                    const saved = JSON.parse(raw);
                    Object.assign(state, saved);
                } catch (e) {}
            }
            updateUI();
        }

        // ─── KISS ──────────────────────────────────────────────────
        function giveKiss(e) {
            e.preventDefault();
            const gain = 1 * state.multi + state.blush * 0.2;
            state.kisses += gain;
            updateUI();

            playMeow();
            playClip();

            catImage.style.transform = 'scale(0.9)';
            setTimeout(() => catImage.style.transform = 'scale(1)', 150);
        }

        // ─── UPGRADES ──────────────────────────────────────────────
        function buyKps() {
            if (state.kisses < state.kissCost) return;
            state.kisses -= state.kissCost;
            state.kps += 1;
            state.kissCost = Math.floor(state.kissCost * 1.8);
            updateUI();
        }

        function buyMulti() {
            if (state.kisses < state.multiCost) return;
            state.kisses -= state.multiCost;
            state.multi += 0.5;
            state.multiCost = Math.floor(state.multiCost * 2.2);
            updateUI();
        }

        function buyBlush() {
            if (state.kisses < state.blushCost) return;
            state.kisses -= state.blushCost;
            state.blush += 1;
            state.blushCost = Math.floor(state.blushCost * 2.5);
            updateUI();
        }

        function resetGame() {
            if (confirm('Reset all your kisses?')) {
                state.kisses = 0;
                state.kps = 0;
                state.multi = 1;
                state.blush = 0;
                state.kissCost = 20;
                state.multiCost = 30;
                state.blushCost = 50;
                updateUI();
                localStorage.removeItem('boykisser_save');
            }
        }

        // ─── PASSIVE (now with multiplier) ──────────────────────────────────────────────
        setInterval(() => {
            if (state.kps > 0) {
                const passiveGain = state.kps * state.multi;
                state.kisses += passiveGain;
                updateUI();
            }
        }, 1000);

        // ─── EVENTS ────────────────────────────────────────────────
        clickArea.addEventListener('click', giveKiss);
        clickArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            giveKiss(e);
        }, { passive: false });

        upgradeKps.addEventListener('click', buyKps);
        upgradeMulti.addEventListener('click', buyMulti);
        upgradeBlush.addEventListener('click', buyBlush);
        resetBtn.addEventListener('click', resetGame);

        upgradesToggle.addEventListener('click', () => {
            const show = upgradeList.style.display === 'block';
            upgradeList.style.display = show ? 'none' : 'block';
            upgradesToggle.textContent = show ? '⬆ Upgrades' : '⬇ Upgrades';
        });

        // ─── PREVENT ZOOM ──────────────────────────────────────────
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        document.addEventListener('dblclick', (e) => e.preventDefault());

        // Final save on leave
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('boykisser_save', JSON.stringify(state));
        });

        // ─── START ──────────────────────────────────────────────────
        loadSave();
    </script>
</body>
</html>
