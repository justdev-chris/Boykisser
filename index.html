<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boykisser</title>
    <link rel="icon" href="https://catsdevs.online/Boykisser/assets/cat/default.png" type="image/png">
    <script>
        if (window.location.search.includes('debug')) {
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/vconsole@latest/dist/vconsole.min.js';
            script.onload = () => { new VConsole(); };
            document.head.appendChild(script);
        }
    </script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
        body{background:#ffffff;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;margin:0;padding:16px;touch-action:manipulation}
        .container{text-align:center;max-width:400px;width:100%}
        .kiss-counter{font-size:clamp(28px,8vw,48px);font-weight:700;color:#000;margin-bottom:12px;pointer-events:none}
        .cat-container{cursor:pointer;position:relative;display:inline-block;width:100%;max-width:300px;margin:0 auto;touch-action:manipulation}
        .cat-image{width:100%;height:auto;display:block;pointer-events:none;position:relative;z-index:1}
        #clipPlayer{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;max-width:400px;z-index:999;border-radius:16px;box-shadow:0 0 40px rgba(0,0,0,0.3);display:none;pointer-events:none;background:#000}
        audio{display:none}
        .upgrade-btn{margin-top:12px;background:#e0e0e0;border:none;padding:8px 20px;border-radius:30px;font-size:14px;font-weight:600;color:#222;cursor:pointer;transition:0.15s;touch-action:manipulation}
        .upgrade-btn:hover{background:#d0d0d0}
        .upgrade-list{margin-top:12px;background:#f5f5f5;border-radius:16px;padding:12px 16px;border:1px solid #ddd;display:none;text-align:left}
        .upgrade-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #eee}
        .upgrade-item:last-child{border-bottom:none}
        .upgrade-name{color:#222;font-weight:500}
        .upgrade-cost{color:#666;font-size:13px}
        .upgrade-btn-small{background:#e0e0e0;border:none;padding:2px 12px;border-radius:20px;font-size:12px;cursor:pointer;touch-action:manipulation}
        .upgrade-btn-small:hover{background:#d0d0d0}
        .reset-btn{background:transparent;border:none;color:#888;font-size:12px;cursor:pointer;margin-top:8px;touch-action:manipulation}
        .reset-btn:hover{color:#222}
    </style>
</head>
<body>
    <div class="container">
        <div class="kiss-counter" id="kissCount">0</div>
        <div class="cat-container" id="clickArea">
            <img id="catImage" src="https://catsdevs.online/Boykisser/assets/cat/default.png" alt="Boykisser" class="cat-image">
        </div>
        <video id="clipPlayer" playsinline></video>
        <button class="upgrade-btn" id="upgradesToggle">⬆ Upgrades</button>
        <div class="upgrade-list" id="upgradeList">
            <div class="upgrade-item">
                <span class="upgrade-name">Kisses per second</span>
                <span class="upgrade-cost" id="kpsDisplay">0</span>
                <button class="upgrade-btn-small" id="upgradeKps">+1</button>
            </div>
            <div class="upgrade-item">
                <span class="upgrade-name">Multiplier</span>
                <span class="upgrade-cost" id="multiDisplay">1x</span>
                <button class="upgrade-btn-small" id="upgradeMulti">+0.5x</button>
            </div>
            <div class="upgrade-item">
                <span class="upgrade-name">Blush power</span>
                <span class="upgrade-cost" id="blushDisplay">0</span>
                <button class="upgrade-btn-small" id="upgradeBlush">+1</button>
            </div>
            <button class="reset-btn" id="resetBtn">↺ reset</button>
        </div>
    </div>

    <script>
        // ─── STATE ──────────────────────────────────────────────────
        let state = {
            kisses: 0,
            kps: 0,
            multi: 1,
            blush: 0,
            kissCost: 20,
            multiCost: 30,
            blushCost: 50
        };

        // ─── MEDIA ──────────────────────────────────────────────────
        const clipUrls = [
            'https://catsdevs.online/Boykisser/assets/clips/kiss1.mp4',
            'https://catsdevs.online/Boykisser/assets/clips/kiss2.mp4',
            'https://catsdevs.online/Boykisser/assets/clips/kiss3.mp4',
            'https://catsdevs.online/Boykisser/assets/clips/kiss4.mp4',
            'https://catsdevs.online/Boykisser/assets/clips/kiss5.mp4'
        ];
        const meowUrls = [
            'https://catsdevs.online/Boykisser/assets/sounds/meow1.mp3',
            'https://catsdevs.online/Boykisser/assets/sounds/meow2.mp3'
        ];

        // ─── PRELOAD CLIPS ──────────────────────────────────────────
        const clipBlobs = [];
        let clipsReady = false;

        async function preloadClips() {
            const fetchPromises = clipUrls.map(async (url) => {
                const resp = await fetch(url);
                const blob = await resp.blob();
                return URL.createObjectURL(blob);
            });
            const blobs = await Promise.all(fetchPromises);
            clipBlobs.push(...blobs);
            clipsReady = true;
            console.log('✅ Clips preloaded');
        }

        // ─── MEOW POOL (8 elements) ────────────────────────────────
        const meowPool = Array.from({ length: 8 }, (_, i) => {
            const audio = new Audio(meowUrls[i % meowUrls.length]);
            audio.preload = 'auto';
            audio.load();
            return audio;
        });
        let meowIndex = 0;

        function playMeow() {
            const audio = meowPool[meowIndex % meowPool.length];
            audio.currentTime = 0;
            audio.play().catch(() => {});
            meowIndex++;
        }

        // ─── CLIP PLAYER ────────────────────────────────────────────
        const clipPlayer = document.getElementById('clipPlayer');

        function playClip() {
            if (!clipsReady) return;
            const url = clipBlobs[Math.floor(Math.random() * clipBlobs.length)];
            clipPlayer.src = url;
            clipPlayer.currentTime = 0;
            clipPlayer.style.display = 'block';
            clipPlayer.play().catch(() => {});

            clearTimeout(clipPlayer._hideTimer);
            const hide = () => {
                clipPlayer.style.display = 'none';
                clipPlayer.pause();
            };
            clipPlayer.onended = hide;
            clipPlayer._hideTimer = setTimeout(hide, 3000);
        }

        // ─── DOM REFS ──────────────────────────────────────────────
        const kissCount = document.getElementById('kissCount');
        const catImage = document.getElementById('catImage');
        const clickArea = document.getElementById('clickArea');

        const kpsDisplay = document.getElementById('kpsDisplay');
        const multiDisplay = document.getElementById('multiDisplay');
        const blushDisplay = document.getElementById('blushDisplay');
        const upgradeKps = document.getElementById('upgradeKps');
        const upgradeMulti = document.getElementById('upgradeMulti');
        const upgradeBlush = document.getElementById('upgradeBlush');
        const resetBtn = document.getElementById('resetBtn');
        const upgradesToggle = document.getElementById('upgradesToggle');
        const upgradeList = document.getElementById('upgradeList');

        // ─── UI ──────────────────────────────────────────────────────
        function updateUI() {
            kissCount.textContent = Math.floor(state.kisses).toLocaleString();
            kpsDisplay.textContent = state.kps;
            multiDisplay.textContent = state.multi.toFixed(1) + 'x';
            blushDisplay.textContent = state.blush;
            upgradeKps.textContent = `+1 (${Math.floor(state.kissCost)})`;
            upgradeMulti.textContent = `+0.5x (${Math.floor(state.multiCost)})`;
            upgradeBlush.textContent = `+1 (${Math.floor(state.blushCost)})`;
            localStorage.setItem('boykisser_save', JSON.stringify(state));
        }

        function loadSave() {
            const raw = localStorage.getItem('boykisser_save');
            if (raw) {
                try { Object.assign(state, JSON.parse(raw)); } catch (e) {}
            }
            updateUI();
        }

        // ─── KISS ──────────────────────────────────────────────────
        function giveKiss(e) {
            e.preventDefault();
            const gain = 1 * state.multi + state.blush * 0.2;
            state.kisses += gain;
            updateUI();

            playMeow();

            // 1 in 4 chance to play a clip
            if (Math.floor(Math.random() * 4) === 0) {
                playClip();
            }

            catImage.style.transform = 'scale(0.95)';
            setTimeout(() => catImage.style.transform = 'scale(1)', 120);
        }

        // ─── UPGRADES ──────────────────────────────────────────────
        function buyKps() {
            if (state.kisses < state.kissCost) return;
            state.kisses -= state.kissCost;
            state.kps += 1;
            state.kissCost = Math.floor(state.kissCost * 1.8);
            updateUI();
        }
        function buyMulti() {
            if (state.kisses < state.multiCost) return;
            state.kisses -= state.multiCost;
            state.multi += 0.5;
            state.multiCost = Math.floor(state.multiCost * 2.2);
            updateUI();
        }
        function buyBlush() {
            if (state.kisses < state.blushCost) return;
            state.kisses -= state.blushCost;
            state.blush += 1;
            state.blushCost = Math.floor(state.blushCost * 2.5);
            updateUI();
        }
        function resetGame() {
            if (confirm('Reset all your kisses?')) {
                state.kisses = 0; state.kps = 0; state.multi = 1; state.blush = 0;
                state.kissCost = 20; state.multiCost = 30; state.blushCost = 50;
                updateUI();
                localStorage.removeItem('boykisser_save');
            }
        }

        // ─── PASSIVE ──────────────────────────────────────────────
        setInterval(() => {
            if (state.kps > 0) {
                state.kisses += state.kps * state.multi;
                updateUI();
            }
        }, 1000);

        // ─── EVENTS ────────────────────────────────────────────────
        clickArea.addEventListener('click', giveKiss);
        clickArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            giveKiss(e);
        }, { passive: false });

        upgradeKps.addEventListener('click', buyKps);
        upgradeMulti.addEventListener('click', buyMulti);
        upgradeBlush.addEventListener('click', buyBlush);
        resetBtn.addEventListener('click', resetGame);

        upgradesToggle.addEventListener('click', () => {
            const show = upgradeList.style.display === 'block';
            upgradeList.style.display = show ? 'none' : 'block';
            upgradesToggle.textContent = show ? '⬆ Upgrades' : '⬇ Upgrades';
        });

        // ─── ANTI ZOOM ────────────────────────────────────────────
        document.addEventListener('gesturestart', e => e.preventDefault());
        document.addEventListener('dblclick', e => e.preventDefault());

        // ─── SAVE ──────────────────────────────────────────────────
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('boykisser_save', JSON.stringify(state));
        });

        // ─── START ──────────────────────────────────────────────────
        preloadClips();
        loadSave();
    </script>
</body>
</html>
